<title>CarbuTrack</title>
<script>
(function(){
  try{
    const c=document.createElement('canvas');c.width=512;c.height=512;
    const ctx=c.getContext('2d');
    const r=100;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(512-r,0);ctx.quadraticCurveTo(512,0,512,r);ctx.lineTo(512,512-r);ctx.quadraticCurveTo(512,512,512-r,512);ctx.lineTo(r,512);ctx.quadraticCurveTo(0,512,0,512-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
    const bg=ctx.createLinearGradient(0,0,512,512);bg.addColorStop(0,'#13162A');bg.addColorStop(1,'#0F1117');ctx.fillStyle=bg;ctx.fill();
    const glow=ctx.createRadialGradient(256,256,40,256,256,220);glow.addColorStop(0,'rgba(245,158,11,0.18)');glow.addColorStop(1,'rgba(245,158,11,0)');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(256,256,220,0,Math.PI*2);ctx.fill();
    ctx.font='260px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⛽',256,265);
    ctx.font='bold 52px -apple-system,sans-serif';ctx.fillStyle='#F59E0B';ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText('CarbuTrack',256,470);
    ctx.beginPath();ctx.arc(256,256,248,0,Math.PI*2);ctx.strokeStyle='rgba(245,158,11,0.25)';ctx.lineWidth=6;ctx.stroke();
    const lnk=document.createElement('link');lnk.rel='apple-touch-icon';lnk.href=c.toDataURL('image/png');document.head.appendChild(lnk);
    const fav=document.createElement('link');fav.rel='icon';fav.type='image/png';fav.href=c.toDataURL('image/png');document.head.appendChild(fav);
  }catch(e){}
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root{
  --bg:#0F1117;--surface:#1A1D2E;--surface2:#232640;
  --amber:#F59E0B;--amber-dim:#92600A44;
  --blue:#3B82F6;--green:#10B981;--red:#EF4444;--purple:#A855F7;--teal:#14B8A6;--orange:#F97316;
  --text:#F1F5F9;--text-dim:#94A3B8;--text-muted:#475569;
  --border:#2D3250;--radius:14px;--sidebar-w:230px;
  --safe-top:env(safe-area-inset-top,44px);--safe-bot:env(safe-area-inset-bottom,20px);
  transition:background .3s,color .3s;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{overflow:hidden;}
/* Texture overlay sits under everything */
#texture-overlay{position:fixed;inset:0;pointer-events:none;z-index:0;}
/* App and all UI sit above */
.app,.tab-bar,.modal-overlay,.confirm-overlay{position:relative;z-index:1;}
.app{display:flex;height:100vh;height:100dvh;position:relative;z-index:1;}
.sidebar{display:none;width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);flex-direction:column;padding:32px 0 24px;}
.sidebar-logo{padding:0 20px 24px;}
.sidebar-logo-title{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--amber);}
.sidebar-logo-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:4px;padding:0 12px;overflow-y:auto;}
.sidebar-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:none;background:none;color:var(--text-dim);font-size:14px;font-weight:600;cursor:pointer;text-align:left;transition:background .15s,color .15s;font-family:inherit;width:100%;}
.sidebar-btn:hover{background:var(--surface2);color:var(--text);}
.sidebar-btn.active{background:var(--amber-dim);color:var(--amber);}
.s-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sidebar-footer{padding:16px 20px 0;border-top:1px solid var(--border);margin:0 12px;}
.sidebar-footer-text{font-size:11px;color:var(--text-muted);line-height:1.5;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.status-bar{height:var(--safe-top);background:var(--bg);flex-shrink:0;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
@media(max-width:767px){.content{padding-bottom:calc(72px + var(--safe-bot));}}
@media(min-width:768px){.status-bar{display:none;}.sidebar{display:flex;}.content{padding-bottom:28px;}}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(26,29,46,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:var(--safe-bot);z-index:100;}.tab-bar-inner{display:flex;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px 5px;background:none;border:none;color:var(--text-muted);font-size:9px;font-weight:500;cursor:pointer;transition:color .2s;}
.tab-btn.active{color:var(--amber);}
.tab-icon{font-size:19px;line-height:1;}
@media(min-width:768px){.tab-bar{display:none;}}
.page-wrap{max-width:900px;margin:0 auto;}
.page-header{padding:20px 20px 8px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.page-title{font-size:26px;font-weight:700;letter-spacing:-.5px;}
.page-subtitle{font-size:13px;color:var(--text-dim);margin-top:2px;}
@media(min-width:768px){.page-header{padding:28px 28px 12px;}.page-title{font-size:28px;}}
@media(min-width:768px){.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}.dash-full{grid-column:1/-1;}}
.vehicle-toggle-wrap{padding:0 20px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.vehicle-toggle{display:flex;background:var(--surface);border-radius:12px;padding:4px;gap:4px;min-width:max-content;}
.vehicle-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:9px;border:none;background:none;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit;}
.vehicle-btn.active{background:var(--amber);color:#000;}
.veh-add-btn{padding:8px 12px;border-radius:9px;border:none;background:none;color:var(--text-muted);font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0;}
.veh-add-btn:hover{color:var(--amber);}
.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin:0 20px 12px;border:1px solid var(--border);}
.card-title{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 20px 12px;}
@media(min-width:900px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:14px 12px;border:1px solid var(--border);}
.stat-value{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px;}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:3px;}
.stat-accent{color:var(--amber);}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:4px 0 8px;}
.gauge-svg{width:180px;height:100px;}
.fuel-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.fuel-sp95{background:rgba(59,130,246,.15);color:#60A5FA;}
.fuel-sp98{background:rgba(245,158,11,.15);color:var(--amber);}
.fill-item{background:var(--surface);border-radius:var(--radius);padding:13px 16px;margin:0 20px 10px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.fill-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;}
.fill-main{flex:1;min-width:0;}
.fill-date{font-size:11px;color:var(--text-dim);}
.fill-title{font-size:14px;font-weight:600;margin:2px 0 3px;}
.fill-meta{font-size:12px;color:var(--text-dim);}
.fill-cost{text-align:right;flex-shrink:0;}
.fill-cost-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--amber);}
.fill-lkm{font-size:11px;color:var(--text-dim);margin-top:2px;}
.actions-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.form-section{margin:0 20px 16px;}
.form-label{font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s;font-family:inherit;}
.form-input:focus{border-color:var(--amber);}
textarea.form-input{resize:vertical;min-height:80px;font-size:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fuel-type-toggle{display:flex;background:var(--surface);border-radius:10px;padding:4px;}
.fuel-type-btn{flex:1;padding:10px;border-radius:7px;border:none;background:none;color:var(--text-dim);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;}
.fuel-type-btn.sp95.active{background:#1E3A5F;color:#60A5FA;}
.fuel-type-btn.sp98.active{background:#92600A44;color:var(--amber);}
.btn-primary{width:100%;padding:14px;background:var(--amber);border:none;border-radius:12px;color:#000;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit;}
.btn-primary:hover{opacity:.9;}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-danger:hover{background:rgba(239,68,68,.2);}
.btn-edit{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-edit:hover{background:rgba(59,130,246,.2);}
.period-toggle{display:flex;gap:6px;padding:0 20px 12px;flex-wrap:wrap;}
.period-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;}
.period-btn.active{background:var(--amber);border-color:var(--amber);color:#000;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:600;margin-bottom:8px;}
.empty-desc{font-size:14px;color:var(--text-dim);line-height:1.5;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:flex-end;animation:fadeIn .2s;}
.modal{background:var(--surface);width:100%;max-height:82vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(24px + var(--safe-bot));animation:slideUp .25s ease;border-radius:20px 20px 0 0;display:flex;flex-direction:column;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0;flex-shrink:0;}
.modal-close-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--surface2);color:var(--text-dim);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-close-btn:hover{background:var(--border);color:var(--text);}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding-top:16px;}
@media(min-width:768px){.modal-overlay{align-items:center;justify-content:center;}.modal{max-width:540px;max-height:88vh;border-radius:18px;padding:0 0 28px;animation:scaleIn .22s ease;}}
.modal-handle{display:none;}
.modal-title{font-size:18px;font-weight:700;flex:1;}
.modal-preview{margin:0 20px 16px;background:var(--surface2);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-around;}
.preview-item{text-align:center;}
.preview-val{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;}
.preview-lbl{font-size:11px;color:var(--text-dim);margin-top:2px;}
/* STATION SELECTOR */
.station-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;}
.station-opt{border-radius:12px;border:2px solid var(--border);cursor:pointer;transition:all .2s;background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;gap:5px;}
.station-opt.selected{border-width:2px;}
.station-opt-logo{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;letter-spacing:-.5px;flex-shrink:0;}
.station-opt-name{font-size:11px;font-weight:600;color:var(--text-dim);}
.station-opt.selected .station-opt-name{color:var(--text);}
.station-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
/* TUNING */
.part-item{background:var(--surface);border-radius:var(--radius);padding:13px 16px;margin:0 20px 10px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.part-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.part-cost-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--purple);}
.maint-cost-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--orange);}
.tuning-banner{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin:0 20px 12px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
.tuning-banner-col{padding:14px 12px;text-align:center;display:flex;flex-direction:column;justify-content:center;}
.tuning-banner-col+.tuning-banner-col{border-left:1px solid var(--border);}
.tuning-banner-col.left{background:rgba(168,85,247,.08);}
.tuning-banner-col.mid{background:rgba(245,158,11,.06);}
.tuning-banner-col.right{background:rgba(16,185,129,.08);}
.tb-val{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:3px;}
.tb-lbl{font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
/* TUNING TABS */
.inner-tabs{display:flex;gap:6px;padding:0 20px 12px;}
.inner-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.inner-tab.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.inner-tab.maint.active{background:var(--orange);border-color:var(--orange);color:#fff;}
/* TYPE TOGGLE for tuning */
.type-toggle{display:flex;background:var(--surface);border-radius:10px;padding:4px;gap:4px;}
.type-toggle-btn{flex:1;padding:10px;border-radius:7px;border:none;background:none;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;}
.type-toggle-btn.tuning.active{background:rgba(168,85,247,.2);color:var(--purple);}
.type-toggle-btn.maintenance.active{background:rgba(249,115,22,.2);color:var(--orange);}
/* SERVICE ALERT */
.service-alert{margin:0 20px 12px;border-radius:var(--radius);padding:14px 16px;border:2px solid;animation:pulseAlert 2s ease-in-out infinite;}
.service-alert.urgent{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.5);}
.service-alert.warning{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.4);}
.service-alert-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.service-alert-sub{font-size:12px;opacity:.8;line-height:1.5;}
.service-progress-bar{height:6px;border-radius:3px;background:var(--border);margin-top:10px;overflow:hidden;}
.service-progress-fill{height:100%;border-radius:3px;transition:width .5s ease;}
@keyframes pulseAlert{0%,100%{opacity:1}50%{opacity:.85}}
/* SERVICE COUNTDOWN */
.service-next{background:rgba(20,184,166,.06);border:1px solid rgba(20,184,166,.2);border-radius:var(--radius);padding:14px 16px;margin:0 20px 12px;}
.service-next-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;}
.service-next-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.service-next-col{text-align:center;padding:10px 8px;background:var(--surface2);border-radius:10px;}
.service-next-val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
.service-next-lbl{font-size:10px;color:var(--text-muted);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}background:var(--surface);border-radius:var(--radius);padding:14px 16px;margin:0 20px 10px;border:1px solid var(--border);}
.service-item{background:var(--surface);border-radius:var(--radius);padding:16px;margin:0 20px 10px;border:1px solid var(--border);outline:1px solid var(--border);box-shadow:0 0 0 1px var(--border),0 4px 16px rgba(0,0,0,.25);}
.service-header{display:flex;flex-direction:row;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;width:100%;}
.service-km{font-size:22px;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums;line-height:1.2;}
.service-date{font-size:11px;color:var(--text-dim);margin-top:3px;}
.service-checks{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
.check-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.check-done{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25);}
.service-note{font-size:12px;color:var(--text-dim);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.6;}
.checklist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;user-select:none;}
.check-item.checked{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);}
.check-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:all .15s;}
.check-item.checked .check-box{background:var(--green);border-color:var(--green);}
.check-lbl{font-size:13px;font-weight:500;color:var(--text-dim);}
.check-item.checked .check-lbl{color:var(--text);}
/* ICON PICKER */
.icon-picker-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.icon-opt{border-radius:10px;border:2px solid transparent;cursor:pointer;transition:all .2s;background:var(--surface2);display:flex;align-items:center;justify-content:center;width:52px;height:52px;}
.icon-opt.selected{border-color:var(--amber);background:var(--amber-dim);}
/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:0 24px;}
.confirm-box{background:var(--surface);border-radius:16px;padding:24px;width:100%;max-width:340px;border:1px solid var(--border);}
.confirm-btns{display:flex;gap:10px;margin-top:20px;}
/* DONUT */
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1;}
.donut-legend-row{display:flex;justify-content:space-between;align-items:center;}
.donut-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-right:6px;}
@media(min-width:768px){.content::-webkit-scrollbar{width:6px;}.content::-webkit-scrollbar-track{background:transparent;}.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef}=React;

// ── Themes ─────────────────────────────────────────────────────────────────
const THEMES={

const applyTheme=(themeId,accentId,textureId)=>{
  const t=THEMES[themeId]||THEMES['dark'];
  const a=ACCENT_COLORS.find(x=>x.id===accentId)||ACCENT_COLORS[0];
  const tx=TEXTURES[textureId||'none']||TEXTURES['none'];
  const r=document.documentElement;
  r.style.setProperty('--bg',t.bg);
  r.style.setProperty('--surface',t.surface);
  r.style.setProperty('--surface2',t.surface2);
  r.style.setProperty('--text',t.text);
  r.style.setProperty('--text-dim',t.textDim);
  r.style.setProperty('--text-muted',t.textMuted);
  r.style.setProperty('--border',t.border);
  r.style.setProperty('--amber',a.color);
  r.style.setProperty('--amber-dim',a.dim);
  // Apply texture via overlay div
  let overlay=document.getElementById('texture-overlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='texture-overlay';
    overlay.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:0;opacity:1;';
    document.body.appendChild(overlay);
  }
  if(tx.css==='none'){
    overlay.style.backgroundImage='none';
  } else {
    overlay.style.backgroundImage=tx.css;
    overlay.style.backgroundSize=tx.size||'auto';
  }
};

const calcStats=fills=>{
  if(!fills.length)return null;
  const tL=fills.reduce((a,f)=>a+f.quantity,0);
  const tKm=fills.reduce((a,f)=>a+f.km,0);
  const tChf=fills.reduce((a,f)=>a+f.pricePerL*f.quantity,0);
  const s95=fills.filter(f=>f.fuelType==='SP95').reduce((a,f)=>a+f.quantity,0);
  const s98=fills.filter(f=>f.fuelType==='SP98').reduce((a,f)=>a+f.quantity,0);
  const vk=fills.filter(f=>f.km>0);
  const avg=vk.length?+((vk.reduce((a,f)=>a+f.quantity,0)/vk.reduce((a,f)=>a+f.km,0))*100).toFixed(2):null;
  // stations
  const stationMap={};
  fills.forEach(f=>{if(f.station){stationMap[f.station]=(stationMap[f.station]||0)+f.quantity;}});
  return{totalL:+tL.toFixed(1),totalKm:tKm,totalChf:+tChf.toFixed(2),sp95:+s95.toFixed(1),sp98:+s98.toFixed(1),avgL100:avg,count:fills.length,stationMap};
};
const MONTHS=['Jan','Fév','Mar','Avr','Mai','Juin','Jul','Aoû','Sep','Oct','Nov','Déc'];
const fmtDate=iso=>{try{return new Date(iso).toLocaleDateString('fr-CH',{day:'2-digit',month:'short',year:'numeric'});}catch{return iso;}};
const fmtNum=n=>n!=null?n.toLocaleString('fr-CH',{minimumFractionDigits:2,maximumFractionDigits:2}):'–';
const groupBy=(fills,period)=>{
  const map={};
  fills.forEach(f=>{
    const d=new Date(f.date);let key;
    if(period==='week'){const s=new Date(d);s.setDate(d.getDate()-d.getDay()+1);key=s.toISOString().slice(0,10);}
    else if(period==='month')key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    else key=`${d.getFullYear()}`;
    if(!map[key])map[key]={key,totalL:0,totalChf:0,totalKm:0,count:0};
    map[key].totalL+=f.quantity;map[key].totalChf+=f.pricePerL*f.quantity;map[key].totalKm+=f.km;map[key].count++;
  });
  return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key)).slice(-10);
};
const groupByParts=(parts,period)=>{
  const map={};
  parts.forEach(p=>{
    const d=new Date(p.date);let key;
    if(period==='month')key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    else key=`${d.getFullYear()}`;
    if(!map[key])map[key]={key,total:0,count:0};
    map[key].total+=p.price;map[key].count++;
  });
  return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key)).slice(-12);
};
const fmtKey=(key,period)=>{
  if(period==='week')return key.slice(5).replace('-','/');
  if(period==='month'){const[,m]=key.split('-');return MONTHS[parseInt(m)-1];}
  return key;
};

// ── SVG Stacked Bar Chart (tuning purple + maintenance orange) ─────────────
function BarChartStacked({dataTuning,dataMaint,period,height=150}){
  const [tip,setTip]=useState(null);
  // Merge keys from both datasets
  const allKeys=[...new Set([...dataTuning.map(d=>d.key),...dataMaint.map(d=>d.key)])].sort();
  if(!allKeys.length) return null;
  const merged=allKeys.map(key=>({
    key,
    tuning:(dataTuning.find(d=>d.key===key)||{total:0}).total,
    maint:(dataMaint.find(d=>d.key===key)||{total:0}).total,
  }));
  const maxV=Math.max(...merged.map(d=>d.tuning+d.maint))||1;
  const W=600,H=height,P={t:10,r:10,b:30,l:50};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const bW=Math.max(8,cW/merged.length*.55),bGap=cW/merged.length;
  const yT=[0,.25,.5,.75,1].map(p=>({y:P.t+cH*(1-p),v:maxV*p}));
  return React.createElement('div',{style:{position:'relative',width:'100%'}},
    React.createElement('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',display:'block'}},
      yT.map((t,i)=>React.createElement('g',{key:i},
        React.createElement('line',{x1:P.l,y1:t.y,x2:W-P.r,y2:t.y,stroke:'#2D3250',strokeWidth:1}),
        React.createElement('text',{x:P.l-6,y:t.y+4,textAnchor:'end',fontSize:10,fill:'#475569'},
          t.v>=1000?(t.v/1000).toFixed(1)+'k':t.v.toFixed(1))
      )),
      merged.map((d,i)=>{
        const x=P.l+i*bGap+(bGap-bW)/2;
        const hTuning=Math.max(0,d.tuning/maxV*cH);
        const hMaint=Math.max(0,d.maint/maxV*cH);
        const hTotal=hTuning+hMaint;
        return React.createElement('g',{key:d.key,
          onMouseEnter:()=>setTip({label:fmtKey(d.key,period),tuning:d.tuning,maint:d.maint,total:d.tuning+d.maint}),
          onMouseLeave:()=>setTip(null),
          style:{cursor:'pointer'}},
          // Maintenance bar (bottom - orange)
          hMaint>0&&React.createElement('rect',{x,y:P.t+cH-hMaint,width:bW,height:hMaint,fill:'#F97316',rx:hTuning>0?0:3,opacity:.85}),
          // Tuning bar (top - purple)
          hTuning>0&&React.createElement('rect',{x,y:P.t+cH-hTotal,width:bW,height:hTuning,fill:'#A855F7',rx:3,opacity:.85}),
          // Rounded bottom corners when only maint
          React.createElement('text',{x:x+bW/2,y:H-P.b+14,textAnchor:'middle',fontSize:10,fill:'#475569'},fmtKey(d.key,period))
        );
      })
    ),
    tip&&React.createElement('div',{style:{position:'absolute',top:8,left:'50%',transform:'translateX(-50%)',background:'#232640',border:'1px solid #2D3250',borderRadius:8,padding:'8px 12px',fontSize:12,pointerEvents:'none',whiteSpace:'nowrap',zIndex:10}},
      React.createElement('div',{style:{color:'#94A3B8',marginBottom:4,fontWeight:600}},tip.label),
      tip.tuning>0&&React.createElement('div',{style:{color:'#A855F7',fontVariantNumeric:'tabular-nums'}},`🔧 Achat : ${tip.tuning.toFixed(2)} CHF`),
      tip.maint>0&&React.createElement('div',{style:{color:'#F97316',fontVariantNumeric:'tabular-nums'}},`🛠 Maintenance : ${tip.maint.toFixed(2)} CHF`),
      React.createElement('div',{style:{color:'#F1F5F9',fontWeight:700,fontVariantNumeric:'tabular-nums',marginTop:4,paddingTop:4,borderTop:'1px solid #2D3250'}},`Total : ${tip.total.toFixed(2)} CHF`)
    )
  );
}

    React.createElement('div',{className:'tab-bar'},
      React.createElement('div',{className:'tab-bar-inner'},navItems.map(n=>React.createElement('button',{key:n.id,className:`tab-btn ${tab===n.id?'active':''}`,onClick:()=>setTab(n.id)},React.createElement('span',{className:'tab-icon'},n.icon),n.label)))
