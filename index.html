<title>CarbuTrack</title>
<script>
// Generate PWA icon as canvas and inject as apple-touch-icon
(function(){
  try {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const ctx = c.getContext('2d');
    // Background with rounded corners (iOS clips automatically but we round anyway)
    const r = 100;
    ctx.beginPath();
    ctx.moveTo(r,0); ctx.lineTo(512-r,0); ctx.quadraticCurveTo(512,0,512,r);
    ctx.lineTo(512,512-r); ctx.quadraticCurveTo(512,512,512-r,512);
    ctx.lineTo(r,512); ctx.quadraticCurveTo(0,512,0,512-r);
    ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0); ctx.closePath();
    // Dark gradient background
    const bg = ctx.createLinearGradient(0,0,512,512);
    bg.addColorStop(0,'#13162A'); bg.addColorStop(1,'#0F1117');
    ctx.fillStyle = bg; ctx.fill();
    // Amber glow circle behind icon
    const glow = ctx.createRadialGradient(256,256,40,256,256,220);
    glow.addColorStop(0,'rgba(245,158,11,0.18)'); glow.addColorStop(1,'rgba(245,158,11,0)');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(256,256,220,0,Math.PI*2); ctx.fill();
    // Draw fuel pump emoji via text
    ctx.font = '260px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⛽', 256, 265);
    // Bottom text "CarbuTrack"
    ctx.font = 'bold 52px -apple-system,sans-serif';
    ctx.fillStyle = '#F59E0B';
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('CarbuTrack', 256, 470);
    // Amber border ring
    ctx.beginPath(); ctx.arc(256,256,248,0,Math.PI*2);
    ctx.strokeStyle='rgba(245,158,11,0.25)'; ctx.lineWidth=6; ctx.stroke();
    // Inject as link tag
    const link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = c.toDataURL('image/png');
    document.head.appendChild(link);
    // Also set favicon
    const fav = document.createElement('link');
    fav.rel = 'icon'; fav.type = 'image/png';
    fav.href = c.toDataURL('image/png');
    document.head.appendChild(fav);
  } catch(e){}
})();
</script>

<style>
:root{
  --bg:#0F1117;--surface:#1A1D2E;--surface2:#232640;
  --amber:#F59E0B;--amber-dim:#92600A44;
  --blue:#3B82F6;--green:#10B981;--red:#EF4444;--purple:#A855F7;--teal:#14B8A6;
  --text:#F1F5F9;--text-dim:#94A3B8;--text-muted:#475569;
  --border:#2D3250;--radius:14px;--sidebar-w:230px;
  --safe-top:env(safe-area-inset-top,44px);--safe-bot:env(safe-area-inset-bottom,20px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{overflow:hidden;}
.app{display:flex;height:100vh;height:100dvh;}

/* SIDEBAR */
.sidebar{display:none;width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);flex-direction:column;padding:32px 0 24px;}
.sidebar-logo{padding:0 20px 24px;}
.sidebar-logo-title{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--amber);}
.sidebar-logo-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:4px;padding:0 12px;overflow-y:auto;}
.sidebar-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:none;background:none;color:var(--text-dim);font-size:14px;font-weight:600;cursor:pointer;text-align:left;transition:background .15s,color .15s;font-family:inherit;width:100%;}
.sidebar-btn:hover{background:var(--surface2);color:var(--text);}
.sidebar-btn.active{background:var(--amber-dim);color:var(--amber);}
.s-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sidebar-footer{padding:16px 20px 0;border-top:1px solid var(--border);margin:0 12px;}
.sidebar-footer-text{font-size:11px;color:var(--text-muted);line-height:1.5;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.status-bar{height:var(--safe-top);background:var(--bg);flex-shrink:0;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
@media(max-width:767px){.content{padding-bottom:calc(72px + var(--safe-bot));}}
@media(min-width:768px){.status-bar{display:none;}.sidebar{display:flex;}.content{padding-bottom:28px;}}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(26,29,46,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:var(--safe-bot);z-index:100;}
.tab-bar-inner{display:flex;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 2px 5px;background:none;border:none;color:var(--text-muted);font-size:9px;font-weight:500;cursor:pointer;transition:color .2s;}
.tab-btn.active{color:var(--amber);}
.tab-icon{font-size:19px;line-height:1;}
@media(min-width:768px){.tab-bar{display:none;}}

/* PAGE */
.page-wrap{max-width:900px;margin:0 auto;}
.page-header{padding:20px 20px 8px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.page-title{font-size:26px;font-weight:700;letter-spacing:-.5px;}
.page-subtitle{font-size:13px;color:var(--text-dim);margin-top:2px;}
@media(min-width:768px){.page-header{padding:28px 28px 12px;}.page-title{font-size:28px;}}
@media(min-width:768px){.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}.dash-full{grid-column:1/-1;}}

/* VEHICLE BAR */
.vehicle-toggle-wrap{padding:0 20px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.vehicle-toggle{display:flex;background:var(--surface);border-radius:12px;padding:4px;gap:4px;min-width:max-content;}
.vehicle-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:9px;border:none;background:none;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit;}
.vehicle-btn.active{background:var(--amber);color:#000;}
.vehicle-btn svg{flex-shrink:0;}
.veh-add-btn{padding:8px 12px;border-radius:9px;border:none;background:none;color:var(--text-muted);font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0;}
.veh-add-btn:hover{color:var(--amber);}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin:0 20px 12px;border:1px solid var(--border);}
.card-title{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 20px 12px;}
@media(min-width:900px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:14px 12px;border:1px solid var(--border);}
.stat-value{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px;}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:3px;}
.stat-accent{color:var(--amber);}

/* GAUGES & BADGES */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:4px 0 8px;}
.gauge-svg{width:180px;height:100px;}
.fuel-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.fuel-sp95{background:rgba(59,130,246,.15);color:#60A5FA;}
.fuel-sp98{background:rgba(245,158,11,.15);color:var(--amber);}

/* HISTORY ITEMS */
.fill-item{background:var(--surface);border-radius:var(--radius);padding:13px 16px;margin:0 20px 10px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.fill-icon{width:38px;height:38px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.fill-main{flex:1;min-width:0;}
.fill-date{font-size:11px;color:var(--text-dim);}
.fill-title{font-size:14px;font-weight:600;margin:2px 0 3px;}
.fill-meta{font-size:12px;color:var(--text-dim);}
.fill-cost{text-align:right;flex-shrink:0;}
.fill-cost-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--amber);}
.fill-lkm{font-size:11px;color:var(--text-dim);margin-top:2px;}
.actions-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}

/* FORMS */
.form-section{margin:0 20px 16px;}
.form-label{font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:16px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s;font-family:inherit;}
.form-input:focus{border-color:var(--amber);}
textarea.form-input{resize:vertical;min-height:80px;font-size:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fuel-type-toggle{display:flex;background:var(--surface);border-radius:10px;padding:4px;}
.fuel-type-btn{flex:1;padding:10px;border-radius:7px;border:none;background:none;color:var(--text-dim);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;}
.fuel-type-btn.sp95.active{background:#1E3A5F;color:#60A5FA;}
.fuel-type-btn.sp98.active{background:#92600A44;color:var(--amber);}

/* BUTTONS */
.btn-primary{width:100%;padding:14px;background:var(--amber);border:none;border-radius:12px;color:#000;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit;}
.btn-primary:hover{opacity:.9;}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-danger:hover{background:rgba(239,68,68,.2);}
.btn-edit{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-edit:hover{background:rgba(59,130,246,.2);}

/* PERIOD */
.period-toggle{display:flex;gap:6px;padding:0 20px 12px;flex-wrap:wrap;}
.period-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;}
.period-btn.active{background:var(--amber);border-color:var(--amber);color:#000;}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:600;margin-bottom:8px;}
.empty-desc{font-size:14px;color:var(--text-dim);line-height:1.5;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s;}
.modal{background:var(--surface);width:100%;max-height:82vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(24px + var(--safe-bot));animation:slideUp .25s ease;border-radius:20px 20px 0 0;display:flex;flex-direction:column;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0;flex-shrink:0;}
.modal-close-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--surface2);color:var(--text-dim);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;}
.modal-close-btn:hover{background:var(--border);color:var(--text);}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding-top:16px;}
@media(min-width:768px){.modal-overlay{align-items:center;justify-content:center;}.modal{max-width:540px;max-height:88vh;border-radius:18px;padding:0 0 28px;animation:scaleIn .22s ease;}}
.modal-handle{display:none;}
.modal-title{font-size:18px;font-weight:700;flex:1;}
.modal-preview{margin:0 20px 16px;background:var(--surface2);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-around;}
.preview-item{text-align:center;}
.preview-val{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;}
.preview-lbl{font-size:11px;color:var(--text-dim);margin-top:2px;}

/* TUNING */
.part-item{background:var(--surface);border-radius:var(--radius);padding:13px 16px;margin:0 20px 10px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.part-icon{width:38px;height:38px;border-radius:10px;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.part-cost-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--purple);}

/* TUNING BANNER - 3 columns */
.tuning-banner{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin:0 20px 12px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
.tuning-banner-col{padding:14px 12px;text-align:center;display:flex;flex-direction:column;justify-content:center;}
.tuning-banner-col+.tuning-banner-col{border-left:1px solid var(--border);}
.tuning-banner-col.left{background:rgba(168,85,247,.08);}
.tuning-banner-col.mid{background:rgba(245,158,11,.06);}
.tuning-banner-col.right{background:rgba(16,185,129,.08);}
.tb-val{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:3px;}
.tb-lbl{font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

/* SERVICE */
.service-item{background:var(--surface);border-radius:var(--radius);padding:14px 16px;margin:0 20px 10px;border:1px solid var(--border);}
.service-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.service-km{font-size:18px;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums;}
.service-date{font-size:11px;color:var(--text-dim);margin-top:2px;}
.service-checks{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.check-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.check-done{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25);}
.check-skip{background:rgba(71,85,105,.1);color:var(--text-muted);border:1px solid var(--border);text-decoration:line-through;opacity:.5;}
.service-note{font-size:12px;color:var(--text-dim);margin-top:6px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5;}

/* SERVICE CHECKLIST in modal */
.checklist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;user-select:none;}
.check-item.checked{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);}
.check-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:all .15s;}
.check-item.checked .check-box{background:var(--green);border-color:var(--green);}
.check-lbl{font-size:13px;font-weight:500;color:var(--text-dim);}
.check-item.checked .check-lbl{color:var(--text);}
.service-total-banner{background:rgba(20,184,166,.08);border:1px solid rgba(20,184,166,.2);border-radius:var(--radius);padding:14px 16px;margin:0 20px 12px;display:flex;justify-content:space-between;align-items:center;}

/* ICON PICKER */
.icon-picker-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.icon-opt{border-radius:10px;border:2px solid transparent;cursor:pointer;transition:all .2s;background:var(--surface2);display:flex;align-items:center;justify-content:center;width:52px;height:52px;}
.icon-opt.selected{border-color:var(--amber);background:var(--amber-dim);}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:0 24px;}
.confirm-box{background:var(--surface);border-radius:16px;padding:24px;width:100%;max-width:340px;border:1px solid var(--border);}
.confirm-btns{display:flex;gap:10px;margin-top:20px;}

@media(min-width:768px){.content::-webkit-scrollbar{width:6px;}.content::-webkit-scrollbar-track{background:transparent;}.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
</style>

const {useState,useEffect,useRef}=React;

          React.createElement('div',{className:'actions-row'},
            React.createElement('button',{className:'btn-edit',onClick:()=>setEditPart(p)},'✏️ Modifier'),
            React.createElement('button',{className:'btn-danger',onClick:()=>setConfirm({msg:`Supprimer "${p.name}" ?`,cb:()=>setData(d=>({...d,parts:(d.parts||[]).filter(x=>x.id!==p.id)}))})},  '🗑 Supprimer')
          )
        ),
        React.createElement('div',{className:'fill-cost'},React.createElement('div',{className:'part-cost-val'},p.price.toFixed(2)),React.createElement('div',{style:{fontSize:10,color:'var(--text-muted)'}},'CHF'))
      ))
    );
  };

  // ── SERVICE ───────────────────────────────────────────────────────────────
  const Service=()=>React.createElement('div',{className:'page-wrap'},
    React.createElement('div',{className:'page-header'},React.createElement('div',null,React.createElement('div',{className:'page-title'},'🛠️ Service'),React.createElement('div',{className:'page-subtitle'},`${vServices.length} service${vServices.length!==1?'s':''} enregistré${vServices.length!==1?'s':''}`)),addBtn(()=>setShowAddService(true),'var(--teal)')),
    React.createElement(VehicleBar),
    vServices.length===0?React.createElement('div',{className:'empty'},React.createElement('div',{className:'empty-icon'},'🛠️'),React.createElement('div',{className:'empty-title'},'Aucun service enregistré'),React.createElement('div',{className:'empty-desc'},'Enregistrez vos révisions avec les opérations effectuées et le kilométrage.')):
    vServices.map(s=>{
      const done=SERVICE_ITEMS.filter(i=>s.checks.includes(i.id));
      const skip=SERVICE_ITEMS.filter(i=>!s.checks.includes(i.id));
      return React.createElement('div',{key:s.id,className:'service-item'},
        React.createElement('div',{className:'service-header'},
          React.createElement('div',null,
            React.createElement('div',{className:'service-km'},`${s.km.toLocaleString('fr-CH')} km`),
            React.createElement('div',{className:'service-date'},fmtDate(s.date))
          ),
          React.createElement('div',{style:{display:'flex',gap:8,flexShrink:0}},
            React.createElement('button',{className:'btn-edit',style:{fontSize:12},onClick:()=>setEditService(s)},'✏️'),
            React.createElement('button',{className:'btn-danger',style:{fontSize:12},onClick:()=>setConfirm({msg:'Supprimer ce service ?',cb:()=>setData(d=>({...d,services:(d.services||[]).filter(x=>x.id!==s.id)}))})},  '🗑')
          )
        ),
        done.length>0&&React.createElement('div',{className:'service-checks'},
          done.map(i=>React.createElement('span',{key:i.id,className:'check-badge check-done'},'✓ '+i.label))
        ),
        s.note&&React.createElement('div',{className:'service-note'},s.note)
      );
    })
  );

  // ── CHARTS ────────────────────────────────────────────────────────────────
  const Charts=()=>{
    const cd=groupBy(vFills,period);

    // Period label for totals
    const periodLabel=period==='week'?'cette semaine':period==='month'?'ce mois':'cette année';

    // Compute L/100km per bucket (need fills grouped with km info)
    const cdL100=cd.map(d=>{
      const l100=d.totalKm>0?+((d.totalL/d.totalKm)*100).toFixed(2):null;
      return{...d,l100km:l100||0};
    });

    // Total of last visible bucket (most recent period)
    const last=cd.length>0?cd[cd.length-1]:null;
    const lastL100=last&&last.totalKm>0?((last.totalL/last.totalKm)*100).toFixed(2):null;

    // Pill component shown below each chart
    const TotalPill=({label,value,color,extra})=>React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}},
      React.createElement('div',{style:{fontSize:12,color:'var(--text-muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.5px'}},label),
      React.createElement('div',{style:{display:'flex',alignItems:'baseline',gap:6}},
        React.createElement('span',{style:{fontSize:20,fontWeight:700,fontVariantNumeric:'tabular-nums',color}},value),
        extra&&React.createElement('span',{style:{fontSize:12,color:'var(--text-muted)'}},extra)
      )
    );

    return React.createElement('div',{className:'page-wrap'},
      React.createElement('div',{className:'page-header'},React.createElement('div',{className:'page-title'},'Graphiques')),
      React.createElement(VehicleBar),
      React.createElement('div',{className:'period-toggle'},['week','month','year'].map(p=>React.createElement('button',{key:p,className:`period-btn ${period===p?'active':''}`,onClick:()=>setPeriod(p)},p==='week'?'Semaine':p==='month'?'Mois':'Année'))),
      vFills.length<2?React.createElement('div',{className:'empty'},React.createElement('div',{className:'empty-icon'},'📊'),React.createElement('div',{className:'empty-title'},'Pas assez de données'),React.createElement('div',{className:'empty-desc'},'Au moins 2 pleins sont nécessaires.')):
      React.createElement(React.Fragment,null,

        // 1 — Dépenses CHF
        React.createElement('div',{className:'card'},
          React.createElement('div',{className:'card-title'},'Dépenses (CHF)'),
          React.createElement(AreaChart,{data:cd,dataKey:'totalChf',color:'#F59E0B',period,unit:'CHF'}),
          last&&React.createElement(TotalPill,{label:`Total ${periodLabel}`,value:`${last.totalChf.toFixed(2)}`,color:'#F59E0B',extra:'CHF'})
        ),

        // 2 — Litres
        React.createElement('div',{className:'card'},
          React.createElement('div',{className:'card-title'},'Litres consommés'),
          React.createElement(BarChart,{data:cd,dataKey:'totalL',color:'#3B82F6',period,unit:'L'}),
          last&&React.createElement(TotalPill,{label:`Total ${periodLabel}`,value:`${last.totalL.toFixed(1)}`,color:'#3B82F6',extra:'L'})
        ),

        // 3 — Kilomètres
        React.createElement('div',{className:'card'},
          React.createElement('div',{className:'card-title'},'Kilomètres parcourus'),
          React.createElement(AreaChart,{data:cd,dataKey:'totalKm',color:'#10B981',period,unit:'km'}),
          last&&React.createElement(TotalPill,{label:`Total ${periodLabel}`,value:`${Math.round(last.totalKm).toLocaleString('fr-CH')}`,color:'#10B981',extra:'km'})
        ),

        // 4 — L/100 km (new)
        React.createElement('div',{className:'card'},
          React.createElement('div',{className:'card-title'},'Consommation (L/100 km)'),
          React.createElement(AreaChart,{data:cdL100,dataKey:'l100km',color:'#A855F7',period,unit:'L/100'}),
          last&&lastL100&&React.createElement(TotalPill,{label:`Moyenne ${periodLabel}`,value:lastL100,color:'#A855F7',extra:'L/100 km'})
        ),
      )
    );
  };

  const navItems=[
    {id:'dashboard',icon:'🏠',label:'Accueil'},
    {id:'history',icon:'📋',label:'Historique'},
    {id:'tuning',icon:'🔧',label:'Tuning'},
    {id:'service',icon:'🛠️',label:'Service'},
    {id:'charts',icon:'📊',label:'Graphiques'},
    {id:'settings',icon:'⚙️',label:'Réglages'},
  ];

  const renderPage=()=>{
    if(tab==='dashboard') return React.createElement(Dashboard);
    if(tab==='history') return React.createElement(History);
    if(tab==='tuning') return React.createElement(Tuning);
    if(tab==='service') return React.createElement(Service);
    if(tab==='charts') return React.createElement(Charts);
    return React.createElement(Settings,{data,exportData,importRef,setData,defState,setShowVehicleEdit,setConfirm});
  };

  return React.createElement('div',{className:'app'},
    React.createElement('aside',{className:'sidebar'},
      React.createElement('div',{className:'sidebar-logo'},React.createElement('div',{className:'sidebar-logo-title'},'⛽ CarbuTrack'),React.createElement('div',{className:'sidebar-logo-sub'},'Carburant · Tuning · Service')),
      React.createElement('nav',{className:'sidebar-nav'},navItems.map(n=>React.createElement('button',{key:n.id,className:`sidebar-btn ${tab===n.id?'active':''}`,onClick:()=>setTab(n.id)},React.createElement('span',{className:'s-icon'},n.icon),n.label))),
      React.createElement('div',{className:'sidebar-footer'},React.createElement('div',{className:'sidebar-footer-text'},'Données stockées localement.'))
    ),
    React.createElement('div',{className:'main'},
      React.createElement('div',{className:'status-bar'}),
      React.createElement('div',{className:'content'},renderPage()),
    ),
    React.createElement('div',{className:'tab-bar'},
      React.createElement('div',{className:'tab-bar-inner'},navItems.map(n=>React.createElement('button',{key:n.id,className:`tab-btn ${tab===n.id?'active':''}`,onClick:()=>setTab(n.id)},React.createElement('span',{className:'tab-icon'},n.icon),n.label)))
    ),
    (showAdd||editFill)&&React.createElement(FillModal,{vehicleId:activeV,existing:editFill,onClose:()=>{setShowAdd(false);setEditFill(null);},onSave:saveFill}),
    (showAddPart||editPart)&&React.createElement(PartModal,{vehicleId:activeV,existing:editPart,onClose:()=>{setShowAddPart(false);setEditPart(null);},onSave:savePart}),
    (showAddService||editService)&&React.createElement(ServiceModal,{vehicleId:activeV,existing:editService,onClose:()=>{setShowAddService(false);setEditService(null);},onSave:saveService}),
    showVehicleEdit&&React.createElement(VehicleModal,{existing:showVehicleEdit.vehicle,onClose:()=>setShowVehicleEdit(null),onSave:saveVehicle}),
    confirm&&React.createElement(ConfirmDialog,{message:confirm.msg,onConfirm:()=>{confirm.cb();setConfirm(null);},onCancel:()=>setConfirm(null)}),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
